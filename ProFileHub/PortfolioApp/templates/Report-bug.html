<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Bug</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .rounded-img {
            width: 55px;
            height: 55px;
            border-radius: 55px;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        .btn-submit {
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-submit:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
{%load static%}
<body>
    <div class="container">
        <div class="form-container">

            <!-- Heading and Icon -->
            <div class="d-flex flex-column justify-content-center align-items-center mb-4">
                <h2 class="mb-2 text-center">Report Bug</h2>
                <img src="{% static 'images/bug.png' %}" alt="Bug Icon" class="rounded-img mb-2">
            </div>

            <!-- Bug Report Form -->
            <form method="POST" action="">
                {% csrf_token %}

                <!-- Email Field -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email (required)</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
                    <small class="text-muted">This field is required to manage and identify your bug reports.</small>
                </div>

                <!-- Name Field -->
                <div class="mb-3">
                    <label for="name" class="form-label">Name (optional)</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="Enter your name (optional)">
                </div>

                <!-- Bug Type -->
                <div class="mb-3">
                    <label for="bug_type" class="form-label">Bug Type (required)</label>
                    <input type="text" name="bug_type" id="bug_type" class="form-control" placeholder="Type of bug" required>
                </div>

                <!-- Report -->
                <div class="mb-3">
                    <label for="report" class="form-label">Report (required)</label>
                    <textarea name="report" id="report" class="form-control" rows="4" placeholder="Describe the bug" required></textarea>
                </div>

                <!-- Solution (optional) -->
                <div class="mb-3">
                    <label for="solution" class="form-label">Solution (optional)</label>
                    <textarea name="solution" id="solution" class="form-control" rows="3" placeholder="Suggested solution (if any)"></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-submit">Submit Bug Report</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
