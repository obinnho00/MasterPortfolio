<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %} <!-- Load the static template tag -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'Css/main-base.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Css/home.css' %}">
    <title>{% block title %} Main-base {% endblock %}</title>
    
</head>
<body>
    <nav class="custom-navigation navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class=" main-nav top-nav d-flex align-items-center justify-content-between w-100">

                <div class="name-title">
                    <a href="{% url 'home' %}" class=" navbar-brand top-nave-Name">Obi</a>
                    <span class="text-light top-nave-title">Software Engineer</span>
                </div>

                <div class="left-nav d-flex align-items-center">

                    <button class="chart-button btn mx-2" id="chart" title="Chat">
                        <i class="chart-icon bi bi-chat"></i> Chat
                    </button>

                    <button class="intro-button btn mx-2" id="introdoctionpage" title="Intro">
                        <i class="intro-icon bi bi-person"></i> Intro
                    </button>
                    <div class="doropdown-menue dropdown">
                        <button class="project-button btn  dropdown-toggle mx-2" id="project" title="Projects" data-bs-toggle="dropdown">
                            <i class="project-icon bi bi-folder"></i> Projects
                        </button>
                        <ul class="project-menue dropdown-menu">
                            <li><button class="drop-down-item dropdown-item" id="Git-Activities">Github Activities</button></li>
                            <li><button class=" drop-down-item dropdown-item" id="Git-Repo">Project</button></li>
                        </ul>
                    </div>
                    <button class="skill-button skillbtn mx-2" id="skill" title="Skill">
                        <i class="skill-button-icon bi bi-tools"></i> Skill
                    </button>
                    <button class="cv-button btn  mx-2" id="cv" title="CV">
                        <i class="cv-button-icon bi bi-file-earmark-person"></i> CV
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <div class="main-body container my-4">
        {% block content %}
        <!-- Your page content goes here -->
        {% endblock %}
    </div>
    <footer class="footer text-light py-4 fixed-footer">
        <div class="container">
            <div class="row justify-content-center">
                <!-- Footer content left side -->
                <div class="col-md-6 text-center text-md-start">
                    <p>&copy; 2024 Isaac Obi Arum | All rights reserved.</p>
                </div>
                <!-- Footer links right side -->
                <div class="col-md-6 text-center text-md-end">
                    <div class="footer-links" id="footer-popup">
                        <a href="{% url 'website_policies' %}" class="text-light me-3">Privacy Policy</a>|
                        <a href="/terms-of-service/" class="text-light me-3">Terms of Service</a>|
                        <a href="/contact/" class="text-light">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script src="{% static 'js/intro_content.js' %}"></script>
    <link rel="stylesheet" href="{% static 'Css/policy.css' %}">
    <script src="{% static 'js/skill.js' %}"></script>
    <script src="{% static 'js/policy.js' %}"></script>
    <script src="{% static 'js/Git_Activites.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
            crossorigin="anonymous"></script>
    
</body>
</html>
